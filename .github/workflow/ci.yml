name: Python Code Check

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install flake8
      run: pip install flake8
    - name: Run PEP8 check
      run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics